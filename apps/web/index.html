<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="ByteDesk — organize estudos, projetos, roadmaps e mais, tudo em um só lugar."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='1' y='1' width='30' height='30' rx='8.5' fill='%230a0a0a'/%3E%3Cpath d='M9.5 11 L14.5 16 L9.5 21' fill='none' stroke='%23fafafa' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='16.5' y='19.4' width='7' height='2.6' rx='1.3' fill='%23fafafa'/%3E%3C/svg%3E"
    />
    <title>ByteDesk</title>
    <script>
      // Aplica o tema salvo antes da pintura para evitar "flash".
      (function () {
        try {
          var t = localStorage.getItem('devflow-theme');
          if (t === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
