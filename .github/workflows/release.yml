name: Release

# Dispara ao enviar uma tag de versão (ex.: v0.1.0), criada por `npm version`.
# Fluxo: `npm run release:patch` (ou minor/major) → cria commit + tag e faz push →
# este workflow publica uma Release no GitHub com o número da versão.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
