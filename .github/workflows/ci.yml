name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate
        env:
          # generate não conecta ao banco; url fictícia só para satisfazer o schema.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
